<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail Enviado — Alicerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #0a1628 0%, #1e3a8a 60%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 52px 44px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0,0,0,.3);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: #0a1628;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #60a5fa;
        }

        .logo-text { font-size: 1.2rem; font-weight: 800; color: #0f172a; letter-spacing: -.02em; }

        .success-icon {
            width: 72px; height: 72px;
            background: #f0fdf4;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #22c55e;
            margin: 0 auto 24px;
        }

        h1 { font-size: 1.5rem; font-weight: 800; color: #0f172a; letter-spacing: -.03em; margin-bottom: 12px; }

        .subtitle { font-size: .87rem; color: #64748b; line-height: 1.7; margin-bottom: 32px; }

        .tip-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px 20px;
            text-align: left;
            margin-bottom: 28px;
        }

        .tip-box p {
            font-size: .8rem;
            color: #64748b;
            line-height: 1.6;
            display: flex;
            gap: 8px;
        }

        .tip-box i { color: #94a3b8; flex-shrink: 0; margin-top: 2px; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: #0f172a;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: .88rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn:hover { background: #1e293b; transform: translateY(-1px); }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon"><i class="bi bi-buildings"></i></div>
        <div class="logo-text">Alicerce</div>
    </div>

    <div class="success-icon"><i class="bi bi-envelope-check"></i></div>

    <h1>E-mail enviado!</h1>
    <p class="subtitle">
        Se existe uma conta com esse e-mail, voce vai receber um link para redefinir sua senha em instantes.
    </p>

    <div class="tip-box">
        <p><i class="bi bi-info-circle"></i>
        Nao recebeu? Verifique a pasta de spam ou lixo eletronico. O link expira em 24 horas.</p>
    </div>

    <a href="{% url 'usuarios:login' %}" class="btn">
        <i class="bi bi-arrow-left"></i> Voltar para o login
    </a>
</div>
</body>
</html>
