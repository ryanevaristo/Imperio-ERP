<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha — Imperio ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(160deg, #0a1628 0%, #1e3a8a 60%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 44px;
            width: 100%;
            max-width: 460px;
            position: relative;
            box-shadow: 0 24px 80px rgba(0,0,0,.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: #0a1628;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #60a5fa;
        }

        .logo-text { font-size: 1.2rem; font-weight: 800; color: #0f172a; letter-spacing: -.02em; }

        .icon-wrap {
            width: 60px; height: 60px;
            background: #eff6ff;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: #2563eb;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; font-weight: 800; color: #0f172a; letter-spacing: -.03em; margin-bottom: 8px; }

        .subtitle { font-size: .87rem; color: #64748b; line-height: 1.6; margin-bottom: 28px; }

        .form-label {
            display: block;
            font-size: .72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-wrap { position: relative; margin-bottom: 20px; }

        .input-wrap > i {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: .9rem;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            font-size: .88rem;
            font-family: inherit;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            color: #111827;
            background: #f9fafb;
            outline: none;
            transition: all .2s;
        }

        .form-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,.08);
            background: #fff;
        }

        .form-input::placeholder { color: #9ca3af; }

        .btn {
            width: 100%;
            padding: 13px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,.3); }

        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            justify-content: center;
            font-size: .82rem;
            color: #64748b;
            text-decoration: none;
        }

        .back-link:hover { color: #2563eb; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon"><i class="bi bi-buildings"></i></div>
        <div class="logo-text">Imperio ERP</div>
    </div>

    <div class="icon-wrap"><i class="bi bi-shield-lock"></i></div>

    <h1>Recuperar senha</h1>
    <p class="subtitle">
        Informe o e-mail da sua conta. Enviaremos um link para voce criar uma nova senha.
    </p>

    <form method="post">
        {% csrf_token %}
        <label class="form-label" for="id_email">E-mail cadastrado</label>
        <div class="input-wrap">
            <i class="bi bi-envelope"></i>
            <input type="email" name="email" id="id_email" class="form-input"
                   placeholder="seu@email.com.br" required autofocus>
        </div>

        <button type="submit" class="btn">
            <i class="bi bi-send"></i> Enviar link de recuperacao
        </button>
    </form>

    <a href="{% url 'usuarios:login' %}" class="back-link">
        <i class="bi bi-arrow-left"></i> Voltar para o login
    </a>
</div>
</body>
</html>
