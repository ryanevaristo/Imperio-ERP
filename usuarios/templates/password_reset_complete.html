<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Redefinida — Alicerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #0a1628 0%, #1e3a8a 60%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 52px 44px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0,0,0,.3);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: #0a1628;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #60a5fa;
        }

        .logo-text { font-size: 1.2rem; font-weight: 800; color: #0f172a; letter-spacing: -.02em; }

        .success-anim {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; color: #fff;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(34,197,94,.3);
        }

        h1 { font-size: 1.5rem; font-weight: 800; color: #0f172a; letter-spacing: -.03em; margin-bottom: 10px; }

        .subtitle { font-size: .87rem; color: #64748b; line-height: 1.7; margin-bottom: 32px; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 32px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,.3); }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon"><i class="bi bi-buildings"></i></div>
        <div class="logo-text">Alicerce</div>
    </div>

    <div class="success-anim"><i class="bi bi-check-lg"></i></div>

    <h1>Senha redefinida!</h1>
    <p class="subtitle">
        Sua senha foi alterada com sucesso. Agora voce ja pode fazer login com a nova senha.
    </p>

    <a href="{% url 'usuarios:login' %}" class="btn">
        <i class="bi bi-box-arrow-in-right"></i> Ir para o login
    </a>
</div>
</body>
</html>
